<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monte Crown</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --brand: #c0392b;
    --brand-bright: #c0392b;
    --border: rgba(0,0,0,0.12);
    /* clock */
    --tick: #cfcfcf;
    --tick-q: #a8a8a8;
    --hand: #1a1a1a;
    --sec: #c0392b;
    --lume-glow: transparent; /* no glow in light mode */
  }
  :root[data-theme="dark"] {
    --bg: #0b0d10;
    --ink: #e9ecf1;
    --muted: #8b93a3;
    --brand: #e0564a;
    --brand-bright: #ef6f63;
    --border: rgba(255,255,255,0.14);
    /* Rolex Chromalight-style luminous tone */
    --tick: rgba(124, 235, 226, 0.45);
    --tick-q: #8ff2ea;
    --hand: #9af7ee;
    --sec: #ff8a5c;
    --lume-glow: rgba(124, 235, 226, 0.9);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 48px 24px;
    -webkit-font-smoothing: antialiased;
    transition: background-color .3s ease, color .3s ease;
  }
  .logo { width: 96px; height: 96px; margin: 0 auto 26px; display: block; }
  h1 {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 600; font-size: clamp(2.4rem, 7vw, 3.6rem);
    letter-spacing: .14em; text-transform: uppercase;
  }
  .tagline { color: var(--muted); font-weight: 300; letter-spacing: .26em; font-size: .78rem; text-transform: uppercase; margin-top: 12px; }
  .login-link {
    display: inline-block; margin-top: 42px;
    color: var(--brand-bright); font-size: .82rem; letter-spacing: .18em; text-transform: uppercase;
    text-decoration: none; padding-bottom: 4px; border-bottom: 1px solid rgba(192,57,43,0.45);
    transition: color .2s, border-color .2s;
  }
  .login-link:hover { color: #8f2a1f; border-color: var(--brand-bright); }

  .clocks {
    display: flex; justify-content: center; flex-wrap: wrap;
    gap: 54px; margin-top: 64px; padding: 0 24px;
  }
  .clock { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .clock svg { width: 68px; height: 68px; overflow: visible; display: block; }
  .clock .tick   { stroke: var(--tick); stroke-width: 2.2; stroke-linecap: round; }
  .clock .tick.q { stroke: var(--tick-q); stroke-width: 2.8; }
  .clock .hand   { stroke-linecap: round; }
  .clock .h-hour { stroke: var(--hand); stroke-width: 4.4; }
  .clock .h-min  { stroke: var(--hand); stroke-width: 3.2; }
  .clock .h-sec  { stroke: var(--sec); stroke-width: 1.8; }
  .clock .pivot  { fill: var(--hand); }
  .clock .pivot-sec { fill: var(--sec); }
  /* Luminous glow in dark mode (Rolex-in-the-dark) */
  :root[data-theme="dark"] .clock .tick,
  :root[data-theme="dark"] .clock .h-hour,
  :root[data-theme="dark"] .clock .h-min,
  :root[data-theme="dark"] .clock .pivot {
    filter: drop-shadow(0 0 1.5px var(--lume-glow)) drop-shadow(0 0 4px var(--lume-glow));
  }
  :root[data-theme="dark"] .clock .h-sec {
    filter: drop-shadow(0 0 2px rgba(255,138,92,0.85));
  }
  .clock .meta { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .clock .city { font-size: .68rem; letter-spacing: .16em; text-transform: uppercase; color: var(--ink); font-weight: 700; }
  .clock .time { font-size: .64rem; letter-spacing: .08em; color: var(--ink); font-weight: 500; font-variant-numeric: tabular-nums; }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 20;
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--border); background: transparent; color: var(--ink);
    cursor: pointer; display: grid; place-items: center; font-size: 17px; line-height: 1;
    transition: background-color .2s ease, border-color .2s ease, color .2s ease;
  }
  .theme-toggle:hover { border-color: var(--ink); }

  @media (max-width: 680px) {
    body { justify-content: flex-start; padding: 64px 20px 40px; }
    .logo { width: 84px; height: 84px; margin-bottom: 22px; }
    .login-link { margin-top: 34px; }
    .clocks { gap: 26px 22px; margin-top: 44px; }
    .clock svg { width: 52px; height: 52px; }
  }
  @media (max-width: 430px) {
    .clocks { gap: 22px 16px; margin-top: 38px; }
    .clock svg { width: 46px; height: 46px; }
    .clock .city { font-size: .62rem; letter-spacing: .12em; }
    .clock .time { font-size: .6rem; }
  }
</style>
<script>
  // Set theme before paint to avoid flash. Default: saved choice, else system preference.
  (function () {
    try {
      var saved = localStorage.getItem("mc-theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = saved || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "light");
    }
  })();
</script>
</head>

  <h1>Monte Crown Partners</h1>

  <a class="login-link" href="#">Login</a>

  <div class="clocks" id="clocks"></div>

  <script>
    // Theme toggle wiring
    (function () {
      var btn = document.getElementById("themeToggle");
      function syncIcon() {
        var dark = document.documentElement.getAttribute("data-theme") === "dark";
        btn.textContent = dark ? "☀" : "☾";
      }
      syncIcon();
      btn.addEventListener("click", function () {
        var dark = document.documentElement.getAttribute("data-theme") === "dark";
        var next = dark ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem("mc-theme", next); } catch (e) {}
        syncIcon();
      });
    })();

    var CITIES = [
      { name: "Monaco",    tz: "Europe/Monaco" },
      { name: "Sao Paulo", tz: "America/Sao_Paulo" },
      { name: "New York",  tz: "America/New_York" },
      { name: "London",    tz: "Europe/London" },
      { name: "Dubai",     tz: "Asia/Dubai" },
      { name: "Singapore", tz: "Asia/Singapore" }
    ];

    // Build 12 hour ticks (longer at the quarters), no outer ring.
    function ticksMarkup() {
      var s = "";
      for (var i = 0; i < 12; i++) {
        var ang = i * 30 * Math.PI / 180;
        var outer = 46, inner = (i % 3 === 0) ? 40 : 43;
        var x1 = 50 + Math.sin(ang) * inner, y1 = 50 - Math.cos(ang) * inner;
        var x2 = 50 + Math.sin(ang) * outer, y2 = 50 - Math.cos(ang) * outer;
        s += '<line class="tick' + (i % 3 === 0 ? ' q' : '') + '" x1="' + x1.toFixed(2) +
             '" y1="' + y1.toFixed(2) + '" x2="' + x2.toFixed(2) + '" y2="' + y2.toFixed(2) + '"></line>';
      }
      return s;
    }

    var root = document.getElementById("clocks");
    CITIES.forEach(function (c, i) {
      c.id = "ck" + i;
      root.insertAdjacentHTML("beforeend",
        '<div class="clock">' +
          '<svg viewBox="0 0 100 100" id="' + c.id + '">' +
            ticksMarkup() +
            // hands include a short tail (counterweight) past center for balance
            '<line class="hand h-hour" x1="50" y1="58" x2="50" y2="30"></line>' +
            '<line class="hand h-min"  x1="50" y1="60" x2="50" y2="20"></line>' +
            '<line class="hand h-sec"  x1="50" y1="62" x2="50" y2="16"></line>' +
            '<circle class="pivot" cx="50" cy="50" r="2.6"></circle>' +
            '<circle class="pivot-sec" cx="50" cy="50" r="1.3"></circle>' +
          '</svg>' +
          '<span class="meta"><span class="city">' + c.name + '</span>' +
          '<span class="time" id="t' + i + '"></span></span>' +
        '</div>');
    });

    function partsIn(tz) {
      var p = new Intl.DateTimeFormat("en-US", {
        timeZone: tz, hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit"
      }).formatToParts(new Date());
      var o = {};
      p.forEach(function (x) { o[x.type] = x.value; });
      return { h24: +o.hour % 24, m: +o.minute, s: +o.second };
    }

    function tick() {
      CITIES.forEach(function (c, i) {
        var t = partsIn(c.tz);
        var sec = t.s * 6;
        var min = t.m * 6 + t.s * 0.1;
        var hr  = (t.h24 % 12) * 30 + t.m * 0.5;
        var svg = document.getElementById(c.id);
        svg.querySelector(".h-hour").setAttribute("transform", "rotate(" + hr  + " 50 50)");
        svg.querySelector(".h-min").setAttribute("transform",  "rotate(" + min + " 50 50)");
        svg.querySelector(".h-sec").setAttribute("transform",  "rotate(" + sec + " 50 50)");
        var hh = String(t.h24).padStart(2, "0"), mm = String(t.m).padStart(2, "0");
        document.getElementById("t" + i).textContent = hh + ":" + mm;
      });
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
